// ARKA STORY ARTICLES — EDITORIAL RULES FOR CONTENT SOURCED
// FROM WHATSAPP EXPORTS AND CLUB DOCUMENTS
//
// RULE 1 — CHAT ≠ CONSENT
//   A member sharing something in WA does not consent to it
//   appearing in a permanent, indexed help article.
//   Test before publishing: would they be comfortable if a
//   new colleague who was never in the WA group reads this?
//
// RULE 2 — PERSONAL DATA PERMIT LIST
//   ALLOWED:  First name, reading preferences, books read,
//             contributions to the club (founding, building,
//             hosting), historical dates of club events,
//             verbatim quotes ABOUT READING AND BOOKS only.
//   PROHIBITED WITHOUT EXPLICIT OPT-IN:
//             - Full birthdays (day+month) — use month only
//             - Current home city/country
//             - Employer division / department / title
//             - Medical, reproductive, or mental health info
//             - Family members or household details
//             - Specific corporate building/room locations
//             - Named performance rankings
//             - Travel itineraries or location sequences
//
// RULE 3 — THE "PERMANENT RECORD" TEST
//   Before adding any personal fact, ask:
//   "Is this still appropriate 5 years from now if the person
//   has a different job, lives somewhere else, or has asked to
//   be forgotten?"
//   If no → use generalised language.
//
// RULE 4 — OPT-OUT MECHANISM
//   Every article that profiles named members MUST include the
//   standard opt-out callout (huk-warn) before the huk-related
//   footer. See change 15 in the audit for the exact HTML.
//
// RULE 5 — VERBATIM QUOTE TEST
//   Before quoting a WA message verbatim, ask three questions:
//   (a) Is this quote about reading, books, or the club?
//   (b) Would the speaker be proud if their next manager read it?
//   (c) Does it expose personal circumstance (health, finance,
//       family, career status) that was shared in passing?
//   If (a)=No or (b)=No or (c)=Yes → paraphrase, don't quote.
//
// RULE 6 — NEW MEMBER ARTICLES
//   New member introduction messages were sent as personal
//   introductions to a private group. They may not be published
//   verbatim in any Arka Story article without confirmation
//   from the member. Paraphrase them.
//
// RULE 7 — THE ADMIN MAINTAINS A REDACTION LOG
//   Any member who requests removal or editing of their profile
//   entry is documented in a private admin note. This ensures
//   future editors do not accidentally re-add removed content.
// ══════════════════════════════════════════════════════════════

        <h3>What Is Arka?</h3>
        <p>
          Arka Readers Club is a community of Bosch colleagues and ex-Bosch colleagues who believe reading is better
          when shared. It grew from a small WhatsApp group in 2019 into a structured club

        </p>

        </div>

        </p>

        </p>

        </p>

        <p>

        </p>
        <ul style="line-height:1.9;font-size:0.9rem;">

          <li>Don't spam. One message, one thought.</li>
          <li>No one-on-one conversations in the group — take it to private chat.</li>
          <li>No posting between 22:00 and 07:00.</li>

          <li>Don't add people without asking the admin first.</li>
          <li>Don't send data-heavy messages carelessly.</li>

        <div class="huk-tip">

          <em>"Strictly for Bosch colleagues only."</em> This reflects the club's roots.

          community, not an open forum.

        <p>
          One small decision shapes the quality of your entire reading history in Arka —
          where you choose to start your log. It is worth two minutes to get this right.
        </p>

        <h3>The Natural Instinct</h3>
        <p>
          Most people who join a reading app do the same thing on day one: they open
          the shelf and start adding everything they have ever read. Goodreads history,
          childhood favourites, that book from three years ago they still think about.
          It feels like the right way to start — fill in the backstory, then keep going.
        </p>
        <p>
          There is nothing wrong with this impulse. But Arka is not Goodreads, and the
          way this app is built means that decision shapes how your entire membership
          looks — to you and to everyone else in the club.
        </p>

        <h3>Two Kinds of Reading History</h3>
        <p>
          Every book you have ever read falls into one of two categories:
        </p>
        <ul>
          <li><strong>What you read before you found this community</strong> — your
          reading life before Arka existed. Real, valuable, yours. But not part of
          your Arka story.</li>
          <li><strong>What you read as part of Arka</strong> — every page logged,
          every book finished, every review written since you joined. This is your
          Arka journey. This is what the app is designed to show.</li>
        </ul>
        <p>
          Both matter. But only one of them belongs in your Arka shelf.
        </p>

        <h3>Why Starting From Your Join Date Matters</h3>
        <p>
          <strong>Your stats and streak reflect your life inside the club.</strong>
          Your weekly reading streak, your lifetime page count, your badge milestones —
          all of these are calculated from your page logs. If you backfill five years
          of reading history on day one, your stats will reflect a reading life that
          happened before Arka existed. Your streak will look unbroken when it wasn't.
          Your milestones will feel hollow because you crossed them all at once.
        </p>
        <p>
          <strong>The Home feed is a shared, live moment.</strong>
          When you log a book, the whole club sees it in the feed. A book you finished
          in 2021 appearing in the club's live activity stream today sends a signal
          that isn't true — it says you are reading that book right now, alongside
          everyone else. The feed works best when it reflects what people are actually
          reading, together, in real time.
        </p>
        <p>
          <strong>Milestones feel earned when they happen here.</strong>
          Crossing your 1K Pages badge or your 10 Books badge inside Arka — with the
          club watching, with a feed card that the whole community sees — is a
          genuinely different experience from crossing it because you imported a
          decade of history overnight. The badge system is designed to reward your
          commitment to this club, not your lifetime reading output.
        </p>
        <p>
          <strong>Your Arka journey is the interesting one.</strong>
          What have you read since you joined? Which books did you discover because
          another member mentioned them? Which challenge pushed you to try a genre
          you wouldn't have chosen alone? That is the story this app is built to
          tell — and it can only tell it if you let it start from the beginning.
        </p>

        <h3>What You Can — and Should — Add</h3>
        <p>
          None of this means your pre-Arka reading has to disappear. Here is a guide
          to what makes sense to add:
        </p>
        <ul>
          <li>
            <strong>To Read list — add freely.</strong>
            Books you want to read in the future, regardless of when you heard about
            them, belong on your To Read shelf. This is your personal wishlist and

          </li>
          <li>
            <strong>A handful of meaningful past Finished reads — add with care.</strong>
            If there are two or three books that genuinely shaped you as a reader and
            you want them in your Arka history, you can add them as Finished. Set the
            Date Finished accurately — the date you actually read them, not today's
            date. Do not log pages retroactively. This keeps them in your personal
            record without flooding the feed or distorting your streak.
          </li>
          <li>
            <strong>A full Goodreads backlog — think twice.</strong>
            Importing dozens of past reads at once creates a feed event for each one,
            inflates your stats with history that predates the club, and gives you
            milestones you haven't actually earned here. If you want your Goodreads
            history as a reference, keep it there — and let Arka be a fresh start.
          </li>
        </ul>
        <div class="huk-tip">
          <strong>💡 Want to bring your Goodreads library across?</strong> Focus on

        </div>

      tags: 'reading personality, persona, axes, night owl, early bird, devourer, nibbler, binger, metronome, era, time traveler, trendsetter, scale, breadth, genre nomad, specialist, archetype, reading type, personality profile, spectrum',
      snippet: 'How Arka computes your Reading Personality — what each axis measures, what the two poles mean, and how your archetype is named.',
      content: `
        <p>
          Reading Personality is your personal reading fingerprint — computed
          automatically from your page logs and finished books. No surveys, no
          self-reporting. Every axis reflects a genuine pattern the system has
          detected in your actual reading history.
        </p>
        <p>
          This is one of the most unique features of Arka App which no 
          commercial grade app in the market yet provides. Arka App gives you back
          more than it takes from you. You log your reading, it helps you 
          discover yourself. Isn't that great!
        </p>

        <div class="huk-featured-badge">🌙 Reading Personality</div>

        <h3>How it works</h3>
        <p>
          Your Reading Personality is built automatically from your reading history —
          no surveys, no setup. Seven spectrum axes are computed from what you read and
          how you read it. Each axis has two named poles, and you sit somewhere between
          them based on your actual patterns. Once enough axes are settled, they combine
          into a named <b>archetype</b> — your headline Reading Type.
        </p>
        <p>
          Axes marked <em>"still forming"</em> just need a little more reading history
          to settle. They resolve on their own as you log and finish more books — no
          action needed.
        </p>

        <h3>The seven axes</h3>

        <div class="huk-step-box">
          <div class="huk-step-number">1</div>
          <div>
            <strong>Rhythm — Early Bird vs Night Owl</strong><br>
            <em>What it measures:</em> The time of day you most often read.<br>
            <em>Early Bird</em> — the majority of your reading sessions happen before noon.<br>
            <em>Night Owl</em> — the majority of your sessions happen in the evening or after dark.<br>
            Needs a good number of logged sessions to settle — shows as "still forming" until then.
          </div>
        </div>

        <div class="huk-step-box">
          <div class="huk-step-number">2</div>
          <div>
            <strong>Appetite — The Nibbler vs The Devourer</strong><br>
            <em>What it measures:</em> How much you read in a typical sitting.<br>
            <em>The Nibbler</em> — your typical session is short; you read in frequent, smaller bites.<br>
            <em>The Devourer</em> — your typical session is large; when you sit down, you read a lot.<br>

        <p>
          <strong>📌 Pinned announcements</strong> stay at the top of the Home feed until an

        </p>

        <span class="huk-last-updated">Last reviewed: April 2026 (App v67).</span>

        <p>
          If something is not working as expected, try the steps below before submitting
          a bug report. Most issues are solved by a simple refresh.
        </p>

        <h3>Issue 1 — The App Won't Load / Shows a Blank Screen</h3>
        <div class="huk-step-box">
          <div class="huk-step-number">1</div>
          <div>Hard-refresh the page: <strong>Ctrl + Shift + R</strong> on desktop,
          or close and reopen on mobile.</div>
        </div>
        <div class="huk-step-box">
          <div class="huk-step-number">2</div>
          <div>Check your internet connection — the app requires a live connection to
          Google's servers on every load.</div>
        </div>
        <div class="huk-step-box">
          <div class="huk-step-number">3</div>
          <div>Make sure you are signed into the correct Google account (the one you
          registered with, or your linked alternate Gmail).</div>
        </div>
        <div class="huk-step-box">
          <div class="huk-step-number">4</div>
          <div>If it still fails, check whether Google Apps Script is experiencing
          an outage at <strong>workspace.google.com/status</strong> — the official Google Workspace status page that covers Apps Script.</div>
        </div>

        <h3>Issue 2 — My Points Didn't Update After I Logged Pages</h3>
        <p>
          Points are awarded immediately when you save a shelf update or log progress.
          If they look wrong:
        </p>
        <ul>
          <li>Your Arka Points total on the Me tab is recalculated every night
          automatically. The live number may differ slightly from the nightly total —
          this resolves on its own by morning.</li>
          <li>If you entered a page count <em>lower</em> than your previous saved total,
          zero points are awarded (this is a correction, not a new reading session).
          See the Shelving — Part 2 article for how pages are calculated.</li>
        </ul>

        <h3>Issue 3 — My Level Didn't Change Even Though I Have Enough Points</h3>
        <p>
          Level names on your profile update from the nightly sync, even though points
          are awarded in real time. If you just crossed a threshold, your level name may
          show correctly after the next page reload. If it still seems wrong after 24 hours,
          submit a bug report.
        </p>

        <h3>Issue 4 — The Home Feed Is Empty or Shows a Nudge Card</h3>
        <p>
          <strong>If you see a nudge card</strong> (it shows how many days since the last
          club activity and offers buttons to log reading or write a book post), the app
          is working correctly — the club has simply been quiet for a few days. The nudge
          card is normal and will be replaced by real activity cards as soon as anyone
          logs something.
        </p>
        <p>
          <strong>If you see nothing at all</strong> — no cards, no nudge — the feed has
          not finished loading yet. Tap the <strong>⚡ Sync</strong> button at the top
          right of the Home view to trigger a fresh data fetch. If the feed remains blank
          after syncing, try a full page refresh (pull-to-refresh or reload the app).
          If the problem persists, use the feedback form to report it.
        </p>

        <h3>Issue 5 — My Challenge Progress Is Missing</h3>
        <p>
          Progress for most challenges is calculated from your shelf activity. If a book
          you finished is not counting toward your challenge:
        </p>
        <ul>
          <li>Confirm the book is marked as <span class="huk-badge huk-badge--finished">🏆 Finished</span>

          <li>For Bingo Grid challenges, you must manually link a book to each cell —

          <li>For Buddy Read challenges, log your pages — progress is tracked by page
          count, not by Finished status.</li>
        </ul>

        <p>
          This message appears when two members save at the exact same moment and the app

        </p>

        <h3>Can I change my display name?</h3>
        <p>
          Not without admin help. Display names are permanent to keep the feed and

          your current name and desired new name.
        </p>

        <h3>Can I delete my account or remove myself from the app?</h3>
        <p>
          There is no self-service account deletion currently. Contact the admin to
          have your profile removed from the system.
        </p>

        <h3>Can I make my shelf private?</h3>
        <p>
          No. All shelf activity is visible to all club members — that is by design.
          The shared feed is what makes the club feel alive. There is no private mode.
        </p>

        <h3>Can I delete a book from my shelf?</h3>
        <p>
          Yes. Open the book's detail page and tap the action menu at the top right —
          you will see <strong>Remove from Shelf</strong>. The book disappears from your
          shelf completely and is no longer visible to other members.
        </p>
        <div class="huk-warn">
          <strong>⚠️ All AP tied to that record is reversed.</strong> Pages logged,
          the shelving action, any rating, and any review — all reversed at the next
          nightly sync. Use this for genuine shelving mistakes only.
        </div>
        <p>
          If you started a book and gave up, consider
          <span class="huk-badge huk-badge--dnf">🛑 DNF</span> instead — it keeps
          your reading history honest and still earns a small amount of AP.
          Remove from Shelf is best reserved for books added completely in error.
        </p>

        <h3>Why did my points go down?</h3>
        <p>
          All point entries are reviewed automatically every night and corrected
          where needed. Common reasons your total might drop:
        </p>
        <ul>
          <li><strong>Duplicate rating or review</strong> on the same book — only
          one rating award and one review award are kept per book read.</li>
          <li><strong>Multiple reading-status changes on the same book in one day</strong>
          — only the last status change that day earns points; earlier ones are reversed.
          For example, if you change a book To Read → Reading → To Read all in one day,
          only the final To Read earns AP. The app awards points immediately for each
          change as you make it — the reversal of the earlier ones happens overnight.
          This is why your total may look lower the following morning than it did
          the night before.</li>
          <li><strong>Profile update spam</strong> — only one point-earning profile update
          is allowed per day. Additional saves on the same day earn 0 AP.</li>
          <li><strong>Book metadata update within 30 days</strong> — editing a book's
          info (cover, page count, blurb) earns AP only once per book per member per 30 days.
          Updates inside that window are reversed.</li>
          <li><strong>Removing a book from your shelf</strong> — all AP earned on that
          shelf record is reversed, including pages logged, the shelving action, any rating,
          and any review. The reversal processes overnight, so your total may drop the
          morning after you removed the book.</li>
        </ul>
        <p>
          A correction appears as a negative entry in your points history with a short
          explanation. This is not a bug — it is the fair play system working as intended.
        </p>

        <h3>Why does the app show different AP totals at different times?</h3>
        <p>
          Points are awarded as you take actions, but the final verified total on your
          Me tab is confirmed overnight. If the number looks slightly different during
          the day, it will settle by the following morning.
        </p>

        <h3>What happens to my challenge if I don't finish before the end date?</h3>
        <p>
          When a challenge's end date passes, active enrollments close. If you were still
          in Active status (did not reach Finisher or Winner), you keep your enrol AP but
          do not receive finish or win points. Your progress is preserved in the archive
          for your own reference.
        </p>

        <h3>Can I join a challenge after it has already started?</h3>
        <p>
          Yes. You can join any challenge whose status is still <strong>Active</strong>,
          regardless of when it started. There is no join-window cutoff. Keep in mind
          that if significant time has passed, you will have less time to hit the finish
          or win conditions before the end date.
        </p>

        <h3>Can I re-join a challenge I dropped?</h3>
        <p>
          Yes, if the challenge is still <strong>Active</strong>. Dropping a challenge
          permanently loses your previous progress, but the app allows you to re-join by
          tapping <strong>Join Challenge</strong> again. You will start fresh from zero
          progress. If the challenge has already ended or been archived, re-joining is

          the new read.
        </p>

        <p>

          an unexpected duplicate error, try searching the library with a slightly different
          version of the title — for example without "The" or "A" at the start. Slightly
          different editions or subtitles can occasionally slip through — if you spot a
          duplicate, use Edit Book Info to consolidate the metadata and contact the admin
          to remove the extra entry.
        </p>
